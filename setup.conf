# =============================================================================
# setup.conf — configuration for setup.sh
#
# This file is sourced as plain shell by setup.sh. Every setting below is
# actually read by lib/*.sh (there is no decorative/unused option here) —
# see the comment above each one for exactly which module consumes it.
#
# Personal, machine-specific tweaks you do NOT want to commit belong in a
# sibling file named `setup.conf.local` instead: if present, it is sourced
# immediately after this file and silently overrides it. That file is
# git-ignored on purpose (see .gitignore) so `git pull` never conflicts with
# your local customizations.
# =============================================================================

# --- Behaviour flags (also settable via -y/-n/-v command-line flags) --------
# Read by: setup.sh (CLI parsing), lib/ui.sh, lib/pkg.sh, lib/backup.sh,
# lib/link.sh
DOTFILES_ASSUME_YES="${DOTFILES_ASSUME_YES:-false}"
DOTFILES_DRY_RUN="${DOTFILES_DRY_RUN:-false}"
DOTFILES_VERBOSE="${DOTFILES_VERBOSE:-false}"

# --- Locations ---------------------------------------------------------------
# Universal on purpose: every path is derived from $HOME at run time, never
# hardcoded to a specific username.

# Where backups of any file this installer would otherwise overwrite are
# moved to (read by: lib/backup.sh). A fresh timestamped subfolder per run.
DOTFILES_BACKUP_DIR="${DOTFILES_BACKUP_DIR:-$HOME/.local/share/arch-dotfiles-fork/backups/$(date +%Y%m%d-%H%M%S)}"

# Where install logs are written (read by: setup.sh, via log::init).
DOTFILES_LOG_DIR="${DOTFILES_LOG_DIR:-$HOME/.local/state/arch-dotfiles-fork/logs}"

# The home directory dotfiles get linked into (read by: setup.sh's call to
# link::run). Almost always just $HOME; overridable mainly for testing
# against a scratch directory instead of your real home.
DOTFILES_TARGET_HOME="${DOTFILES_TARGET_HOME:-$HOME}"

# --- Directories that must stay REAL directories, never symlinks -----------
# Read by: lib/link.sh (link::_is_ensured_dir). Paths are relative to
# DOTFILES_TARGET_HOME. Use this for anything the repo only ships an empty
# placeholder for, because the real contents are personal/user data that
# should never be replaced by a symlink into the repo.
DOTFILES_ENSURE_DIRS=(
  "Pictures/Wallpapers"
)

# --- Required packages --------------------------------------------------------
# Read by: lib/deps.sh (deps::resolve). Installation aborts (with a chance
# to retry/override — see deps.sh) if these can't be satisfied.
DOTFILES_REQUIRED_PKGS=(
  hyprland
  kitty
  dolphin
  wofi
  pipewire
  pipewire-pulse
  wireplumber
  git
)

# --- Optional packages --------------------------------------------------------
# Read by: lib/deps.sh. Offered, but declining or failing to install these
# never aborts the run.
DOTFILES_OPTIONAL_PKGS=(
  playerctl
  brightnessctl
  libnotify
  ttf-hack-nerd
)

# --- AUR packages --------------------------------------------------------------
# Read by: lib/deps.sh + lib/pkg.sh (pkg::install_aur). Not in the official
# repos, so an AUR helper (yay or paru) must already be installed.
DOTFILES_AUR_PKGS=(
  quickshell-git
)

# --- Known conflicting packages -------------------------------------------------
# Read by: lib/deps.sh (deps::check_conflicts). Flagged with a warning;
# never removed automatically.
DOTFILES_CONFLICT_PKGS=(
  pulseaudio
)

# --- App launcher whitelist ----------------------------------------------------
# Read by: lib/whitelist.sh (whitelist::render), which regenerates
# ~/.config/quickshell/common/Whitelist.qml from this array before linking
# — that file is auto-generated and should not be hand-edited directly.
#
# This is the single place to add/remove apps the launcher shows. Find the
# exact desktop-entry ID for an app with:
#   find /usr/share/applications ~/.local/share/applications -name '*.desktop'
#
# List what's currently configured at any time with: ./setup.sh --list-whitelist
DOTFILES_APP_WHITELIST=(
  "discord.desktop"
  "com.vysp3r.ProtonPlus.desktop"
  "librewolf.desktop"
  "nm-connection-editor.desktop"
  "scrcpy.desktop"
  "steam.desktop"
  "r2modman.desktop"
  "localsend.desktop"
)

# --- Per-monitor wallpaper directories ------------------------------------------
# Read by: lib/wallpaperconf.sh (wallpaperconf::render), which generates
# ~/.config/quickshell/wallpaper/monitors.conf from this array before
# linking — WallpaperService.qml reads that file at runtime.
#
# Optional. Every entry is "MONITOR_NAME:path/under/home" — a monitor not
# listed here just uses the shared library (~/Pictures/Wallpapers,
# ~/Pictures) like before. Monitor names come from `hyprctl monitors`.
# Example:
#   DOTFILES_WALLPAPER_DIRS=(
#     "DP-1:Pictures/Wallpapers/ultrawide"
#     "HDMI-A-1:Pictures/Wallpapers/portrait"
#   )
DOTFILES_WALLPAPER_DIRS=(
)
